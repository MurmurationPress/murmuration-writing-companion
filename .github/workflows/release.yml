name: Publish 0.13.0

on:
  push:
    branches:
      - "agent/release-0.13.0"

permissions:
  contents: write

env:
  RELEASE_TAG: "0.13.0"
  RELEASE_TARGET: "caaae85fcaa5a0523d6e5a76254ca5dad5f97442"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out merged release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TARGET }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Confirm release version
        shell: bash
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$RELEASE_TAG" != "$manifest_version" ]; then
            echo "Release tag $RELEASE_TAG does not match manifest version $manifest_version" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Verify release metadata and assets
        run: npm run release:check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; no action required."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            main.js manifest.json styles.css \
            --target "$RELEASE_TARGET" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md
