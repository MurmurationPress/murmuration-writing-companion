name: Editorial diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Capture test diagnostics
        shell: bash
        run: |
          set +e
          npm test > editorial-diagnostic.txt 2>&1
          status=$?
          echo "exit_code=$status" >> editorial-diagnostic.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: editorial-diagnostic
          path: editorial-diagnostic.txt
          if-no-files-found: error
